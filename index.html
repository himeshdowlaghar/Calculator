<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <h1> <marquee behavior="slide" direction="right">Basic Calculator</marquee></h1>
    <div class="MainBody">
        <input class="display"type="text" placeholder="0" readonly>
        <div>
            <button id="AC">AC</button>
            <button>Del</button>
            <button class="operator">%</button>
            <button class="operator">*</button>
        </div>
        <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="operator">/</button>
        </div>
        <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="operator">-</button>
        </div>
        <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="operator">+</button>
        </div>
        <div>
            <button>0</button>
            <button class="operator">.</button>
            <button id="equals">=</button>
        </div>
    </div>
    <div class="footer">
        <p>Created by Himesh Dowlaghar &copy; 2024</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
